<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSENSI Mobile</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(135deg,#1a73e8,#4e9af1);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  width:100%;
  max-width:420px;
  padding:30px;
  border-radius:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  animation:fadeIn .5s ease;
}

h2{
  text-align:center;
  margin-bottom:20px;
  color:#1a73e8;
}

select,button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:15px;
  font-size:16px;
}

button{
  background:#1a73e8;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

button:hover{opacity:.9}
button:disabled{background:#aaa}

video{
  width:100%;
  border-radius:15px;
  margin-top:15px;
  background:black;
  transform:scaleX(-1);
}

.status-box{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.status-box label{
  flex:1;
  padding:12px;
  border-radius:12px;
  text-align:center;
  border:2px solid #1a73e8;
  cursor:pointer;
  font-weight:bold;
  color:#1a73e8;
}

.status-box input{
  display:none;
}

.status-box input:checked + span{
  background:#1a73e8;
  color:white;
  padding:12px;
  border-radius:10px;
  display:block;
}

#msg{
  text-align:center;
  margin-top:20px;
  font-weight:bold;
}

.loader{
  display:none;
  margin:auto;
  border:4px solid #f3f3f3;
  border-top:4px solid #1a73e8;
  border-radius:50%;
  width:30px;
  height:30px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}
</style>
</head>

<body>

<div class="card">

<h2>ABSENSI Mobile</h2>

<select id="nama">
<option value="">👤 Pilih Nama</option>
<option value="A E Marbun">A E Marbun</option>
<option value="iko permadi">iko permadi</option>
</select>

<div class="status-box">
<label>
  <input type="radio" name="status" value="HADIR" checked>
  <span>HADIR</span>
</label>
<label>
  <input type="radio" name="status" value="PULANG">
  <span>PULANG</span>
</label>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas" style="display:none;"></canvas>

<button onclick="kirim()">KIRIM ABSENSI</button>

<div class="loader" id="loader"></div>
<div id="msg"></div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwX2DO0gWjL7g__xe9zZt3oQEEOH-MqOOpxCZo_1uA5u2O5KyNfFXqmn1lNCfaSCot-_w/exec";

const video = document.getElementById("video");
let stream;

navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
.then(s=>{
  stream = s;
  video.srcObject = s;
})
.catch(()=>{
  document.getElementById("msg").innerHTML="<span style='color:red'>Izin kamera ditolak</span>";
});

async function kirim(){

  const nama = document.getElementById("nama").value;
  const status = document.querySelector("input[name='status']:checked").value;

  if(!nama) return alert("Pilih nama dulu!");

  document.getElementById("loader").style.display="block";
  document.getElementById("msg").innerHTML="";

  const canvas = document.getElementById("canvas");
  canvas.width=320;
  canvas.height=240;
  canvas.getContext("2d").drawImage(video,0,0,320,240);
  const foto = canvas.toDataURL("image/jpeg",0.6);

  try{
    const res = await fetch(WEB_APP_URL,{
      method:"POST",
      body:JSON.stringify({
        namaStaff:nama,
        imageBase64:foto,
        status:status
      })
    });

    const data = await res.json();

    if(data.status==="BERHASIL"){
      document.getElementById("msg").innerHTML=
        `<span style="color:green">✅ BERHASIL<br>${data.nama}<br>Outlet: ${data.outlet}<br>Jam: ${data.jam}</span>`;
      stream.getTracks().forEach(t=>t.stop());
    }else{
      document.getElementById("msg").innerHTML=
        `<span style="color:red">${data}</span>`;
    }

  }catch(err){
    document.getElementById("msg").innerHTML=
      `<span style="color:red">Server error</span>`;
  }

  document.getElementById("loader").style.display="none";
}

</script>

</body>
</html>
