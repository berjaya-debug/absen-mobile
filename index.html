<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSENSI Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --blue: #2563eb;
  --blue-light: #3b82f6;
  --blue-dark: #1d4ed8;
  --blue-glow: rgba(37,99,235,0.4);
  --bg: #0a0f1e;
  --surface: #0f172a;
  --surface2: #1e293b;
  --border: rgba(148,163,184,0.12);
  --text: #f1f5f9;
  --text-muted: #64748b;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  padding: 20px 16px;
}

/* === BACKGROUND EFFECTS === */
.bg-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  animation: orbFloat 8s ease-in-out infinite;
}
.bg-orb-1 {
  width: 400px; height: 400px;
  background: rgba(37,99,235,0.15);
  top: -100px; left: -100px;
  animation-delay: 0s;
}
.bg-orb-2 {
  width: 300px; height: 300px;
  background: rgba(139,92,246,0.1);
  bottom: -80px; right: -80px;
  animation-delay: -4s;
}
.bg-orb-3 {
  width: 200px; height: 200px;
  background: rgba(16,185,129,0.08);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  animation-delay: -2s;
}

@keyframes orbFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-30px) scale(1.05); }
}

/* Grid lines bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* === CARD === */
.card {
  background: linear-gradient(145deg, rgba(15,23,42,0.95), rgba(30,41,59,0.9));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 28px 24px 32px;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 10;
  box-shadow:
    0 0 0 1px rgba(37,99,235,0.1),
    0 40px 80px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.05);
  animation: cardEnter 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  margin: auto;
}

@keyframes cardEnter {
  from { opacity:0; transform: translateY(40px) scale(0.95); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* === HEADER === */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.logo-ring {
  width: 52px; height: 52px;
  margin: 0 auto 10px;
  position: relative;
  animation: logoPulse 3s ease-in-out infinite;
}

.logo-ring svg {
  width: 100%; height: 100%;
}

@keyframes logoPulse {
  0%,100% { filter: drop-shadow(0 0 8px var(--blue-glow)); }
  50% { filter: drop-shadow(0 0 20px var(--blue-glow)); }
}

.header h1 {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header p {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
}

/* === FORM ELEMENTS === */
.field {
  margin-bottom: 16px;
}

.field-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.custom-select {
  position: relative;
}

.custom-select select {
  width: 100%;
  padding: 14px 18px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  appearance: none;
  transition: all 0.3s ease;
  outline: none;
}

.custom-select select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
  background: rgba(37,99,235,0.05);
}

.custom-select::after {
  content: '▾';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  font-size: 16px;
}

.custom-select select option {
  background: #1e293b;
  color: var(--text);
}

/* === STATUS TOGGLE === */
.status-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}

.status-option {
  position: relative;
}

.status-option input {
  display: none;
}

.status-option label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 10px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  user-select: none;
}

.status-option label .icon {
  font-size: 16px;
}

.status-option input:checked + label {
  border-color: var(--blue);
  background: rgba(37,99,235,0.15);
  color: #60a5fa;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.15), 0 4px 20px rgba(37,99,235,0.2);
  transform: translateY(-2px);
}

/* === VIDEO FRAME === */
.video-wrap {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 16px;
  border: 1.5px solid var(--border);
  background: #000;
  aspect-ratio: 4/3;
  max-height: 220px;
}

.video-wrap video {
  width: 100%;
  display: block;
  transform: scaleX(-1);
}

.video-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* Corner brackets */
.video-overlay::before,
.video-overlay::after {
  content: '';
  position: absolute;
  width: 24px; height: 24px;
  border-color: var(--blue);
  border-style: solid;
  opacity: 0.8;
  animation: bracketPulse 2s ease-in-out infinite;
}
.video-overlay::before {
  top: 12px; left: 12px;
  border-width: 3px 0 0 3px;
  border-radius: 4px 0 0 0;
}
.video-overlay::after {
  bottom: 12px; right: 12px;
  border-width: 0 3px 3px 0;
  border-radius: 0 0 4px 0;
}

.scan-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  opacity: 0.6;
  animation: scanDown 3s ease-in-out infinite;
}

@keyframes scanDown {
  0%   { top: 10%; opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.6; }
  100% { top: 90%; opacity: 0; }
}

@keyframes bracketPulse {
  0%,100% { opacity: 0.8; }
  50% { opacity: 0.4; }
}

.cam-badge {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(239,68,68,0.5);
  border-radius: 20px;
  padding: 4px 10px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #fca5a5;
  font-weight: 600;
}

.rec-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--danger);
  animation: blink 1s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}

/* === BUTTON === */
.btn-submit {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 16px;
  font-family: 'Sora', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: #ffffff;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(37,99,235,0.5), 0 2px 8px rgba(0,0,0,0.4);
  margin-top: 4px;
  -webkit-text-fill-color: #ffffff;
}

.btn-submit::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.btn-submit:hover::before { opacity: 1; }
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,99,235,0.5); }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  width: 10px; height: 10px;
  animation: ripple 0.6s ease-out forwards;
  pointer-events: none;
}

@keyframes ripple {
  to { transform: scale(25); opacity: 0; }
}

.btn-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  z-index: 1;
}

/* === LOADER === */
.loader-wrap {
  display: none;
  text-align: center;
  margin-top: 16px;
}

.loader-dots {
  display: inline-flex;
  gap: 6px;
  align-items: center;
}

.loader-dots span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--blue-light);
  animation: dotBounce 1.2s ease-in-out infinite;
}
.loader-dots span:nth-child(2) { animation-delay: 0.2s; }
.loader-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%,80%,100% { transform: scale(0.7); opacity: 0.5; }
  40% { transform: scale(1.2); opacity: 1; }
}

.loader-text {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
  animation: textPulse 1.5s ease-in-out infinite;
}

@keyframes textPulse {
  0%,100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* === MODAL / POPUP === */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  padding: 20px;
}

.modal-backdrop.show {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: linear-gradient(145deg, #0f172a, #1e293b);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px 28px;
  width: 100%;
  max-width: 360px;
  position: relative;
  transform: scale(0.8) translateY(20px);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  text-align: center;
}

.modal-backdrop.show .modal {
  transform: scale(1) translateY(0);
}

.modal-icon {
  width: 72px; height: 72px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 32px;
  animation: iconPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}

@keyframes iconPop {
  from { transform: scale(0) rotate(-20deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg); opacity: 1; }
}

.modal-icon.success {
  background: rgba(16,185,129,0.15);
  border: 2px solid rgba(16,185,129,0.4);
}
.modal-icon.error {
  background: rgba(239,68,68,0.15);
  border: 2px solid rgba(239,68,68,0.4);
}
.modal-icon.warning {
  background: rgba(245,158,11,0.15);
  border: 2px solid rgba(245,158,11,0.4);
}

.modal-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
}

.modal-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 20px;
  line-height: 1.6;
}

.modal-info {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 20px;
  text-align: left;
}

.modal-info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.modal-info-row:last-child { border-bottom: none; }

.modal-info-row .key {
  color: var(--text-muted);
  font-weight: 500;
}

.modal-info-row .val {
  color: var(--text);
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.modal-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.modal-btn.success-btn {
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  box-shadow: 0 4px 20px rgba(16,185,129,0.3);
}

.modal-btn.error-btn {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  box-shadow: 0 4px 20px rgba(239,68,68,0.3);
}

.modal-btn.warning-btn {
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: white;
}

.modal-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

/* Confetti particles */
.confetti-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 99;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  width: 8px; height: 8px;
  opacity: 0;
  animation: confettiFall 2s ease-in forwards;
}

@keyframes confettiFall {
  0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
  100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
}

/* Toast notifications */
.toast-container {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}

.toast {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  min-width: 250px;
  animation: toastSlide 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  pointer-events: all;
}

@keyframes toastSlide {
  from { transform: translateX(120%); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

.toast.exit {
  animation: toastExit 0.3s ease forwards;
}

@keyframes toastExit {
  to { transform: translateX(120%); opacity: 0; }
}

.toast-icon { font-size: 16px; }
.toast-msg  { flex: 1; font-weight: 500; }

/* === PARTICLE BURST === */
@keyframes particleBurst {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

</style>
</head>
<body>

<!-- BG orbs -->
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<!-- Confetti container -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Main card -->
<div class="card">

  <div class="header">
    <div class="logo-ring">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" stroke="url(#ringGrad)" stroke-width="2"/>
        <circle cx="32" cy="26" r="9" fill="url(#faceGrad)" opacity="0.9"/>
        <path d="M14 52c0-9.94 8.06-18 18-18s18 8.06 18 18" stroke="url(#ringGrad)" stroke-width="2" stroke-linecap="round"/>
        <defs>
          <linearGradient id="ringGrad" x1="2" y1="2" x2="62" y2="62" gradientUnits="userSpaceOnUse">
            <stop stop-color="#60a5fa"/>
            <stop offset="1" stop-color="#a78bfa"/>
          </linearGradient>
          <linearGradient id="faceGrad" x1="23" y1="17" x2="41" y2="35" gradientUnits="userSpaceOnUse">
            <stop stop-color="#60a5fa"/>
            <stop offset="1" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <h1>ABSENSI MOBILE</h1>
    <p>FACIAL RECOGNITION CHECK-IN</p>
  </div>

  <!-- Nama -->
  <div class="field">
    <span class="field-label">Nama Staff</span>
    <div class="custom-select">
      <select id="nama" onchange="onNamaChange(this)">
        <option value="">Pilih nama Anda…</option>
        <option value="A E Marbun">A E Marbun</option>
        <option value="iko permadi">iko permadi</option>
      </select>
    </div>
  </div>

  <!-- Status -->
  <div class="field">
    <span class="field-label">Status Kehadiran</span>
    <div class="status-toggle">
      <div class="status-option">
        <input type="radio" name="status" id="s_hadir" value="HADIR" checked>
        <label for="s_hadir">
          <span class="icon">🟢</span> HADIR
        </label>
      </div>
      <div class="status-option">
        <input type="radio" name="status" id="s_pulang" value="PULANG">
        <label for="s_pulang">
          <span class="icon">🔴</span> PULANG
        </label>
      </div>
    </div>
  </div>

  <!-- Camera -->
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="video-overlay">
      <div class="scan-line"></div>
    </div>
    <div class="cam-badge">
      <div class="rec-dot"></div> LIVE
    </div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <button class="btn-submit" id="btnSubmit" onclick="handleSubmit(event)">
    <div class="btn-inner">
      <span>📸</span>
      <span>KIRIM ABSENSI</span>
    </div>
  </button>

  <div class="loader-wrap" id="loaderWrap">
    <div class="loader-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="loader-text" id="loaderText">Mengambil foto…</div>
  </div>

</div>

<!-- === SUCCESS MODAL === -->
<div class="modal-backdrop" id="modalSuccess">
  <div class="modal">
    <div class="modal-icon success">✅</div>
    <div class="modal-title">Absensi Berhasil!</div>
    <div class="modal-subtitle">Data kehadiran Anda telah tercatat.</div>
    <div class="modal-info">
      <div class="modal-info-row">
        <span class="key">👤 Nama</span>
        <span class="val" id="resNama">—</span>
      </div>
      <div class="modal-info-row">
        <span class="key">🏪 Outlet</span>
        <span class="val" id="resOutlet">—</span>
      </div>
      <div class="modal-info-row">
        <span class="key">🕐 Jam</span>
        <span class="val" id="resJam">—</span>
      </div>
    </div>
    <button class="modal-btn success-btn" onclick="closeModal('modalSuccess')">Tutup</button>
  </div>
</div>

<!-- === ERROR MODAL === -->
<div class="modal-backdrop" id="modalError">
  <div class="modal">
    <div class="modal-icon error">❌</div>
    <div class="modal-title">Absensi Gagal</div>
    <div class="modal-subtitle" id="errorMsg">Terjadi kesalahan. Silakan coba lagi.</div>
    <button class="modal-btn error-btn" onclick="closeModal('modalError')">Coba Lagi</button>
  </div>
</div>

<!-- === WARNING MODAL === -->
<div class="modal-backdrop" id="modalWarning">
  <div class="modal">
    <div class="modal-icon warning">⚠️</div>
    <div class="modal-title">Perhatian</div>
    <div class="modal-subtitle" id="warningMsg">—</div>
    <button class="modal-btn warning-btn" onclick="closeModal('modalWarning')">OK, Mengerti</button>
  </div>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwX2DO0gWjL7g__xe9zZt3oQEEOH-MqOOpxCZo_1uA5u2O5KyNfFXqmn1lNCfaSCot-_w/exec";

const video = document.getElementById("video");
let stream;
let cameraReady = false;

// === INIT CAMERA ===
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
  .then(s => {
    stream = s;
    video.srcObject = s;
    cameraReady = true;
    showToast("✅", "Kamera aktif", "success");
  })
  .catch(() => {
    showToast("❌", "Izin kamera ditolak", "error");
    document.getElementById("btnSubmit").disabled = true;
  });

// === EVENTS ===
function onNamaChange(sel) {
  if (sel.value) {
    showToast("👤", `Selamat datang, ${sel.value}!`, "info");
  }
}

document.querySelectorAll("input[name='status']").forEach(r => {
  r.addEventListener("change", () => {
    const label = r.value === "HADIR" ? "Mode: CHECK-IN 🟢" : "Mode: CHECK-OUT 🔴";
    showToast("🔄", label, "info");
  });
});

// === SUBMIT ===
async function handleSubmit(e) {
  // Ripple
  const btn = document.getElementById("btnSubmit");
  const ripple = document.createElement("div");
  ripple.className = "btn-ripple";
  const rect = btn.getBoundingClientRect();
  ripple.style.left = (e.clientX - rect.left - 5) + "px";
  ripple.style.top  = (e.clientY - rect.top - 5) + "px";
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);

  const nama   = document.getElementById("nama").value;
  const status = document.querySelector("input[name='status']:checked").value;

  // Validation
  if (!nama) {
    showWarning("Silakan pilih nama Anda terlebih dahulu sebelum melakukan absensi.");
    return;
  }

  if (!cameraReady) {
    showWarning("Kamera belum aktif. Harap izinkan akses kamera dan coba lagi.");
    return;
  }

  setLoading(true);

  try {
    setLoaderText("Mengambil foto…");
    await delay(500);

    const canvas = document.getElementById("canvas");
    canvas.width  = 320;
    canvas.height = 240;
    canvas.getContext("2d").drawImage(video, 0, 0, 320, 240);
    const foto = canvas.toDataURL("image/jpeg", 0.6);

    setLoaderText("Mengirim data…");

    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ namaStaff: nama, imageBase64: foto, status })
    });

    const data = await res.json();

    if (data.status === "BERHASIL") {
      document.getElementById("resNama").textContent   = data.nama;
      document.getElementById("resOutlet").textContent = data.outlet;
      document.getElementById("resJam").textContent    = data.jam;
      showModal("modalSuccess");
      launchConfetti();
      if (stream) stream.getTracks().forEach(t => t.stop());
    } else {
      document.getElementById("errorMsg").textContent = data.msg || "Terjadi kesalahan. Silakan coba lagi.";
      showModal("modalError");
    }

  } catch(err) {
    document.getElementById("errorMsg").textContent = "Tidak dapat terhubung ke server. Periksa koneksi internet Anda.";
    showModal("modalError");
  }

  setLoading(false);
}

// === HELPERS ===
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function setLoading(on) {
  const btn  = document.getElementById("btnSubmit");
  const wrap = document.getElementById("loaderWrap");
  btn.disabled = on;
  wrap.style.display = on ? "block" : "none";
  btn.querySelector(".btn-inner span:last-child").textContent = on ? "Memproses…" : "KIRIM ABSENSI";
}

function setLoaderText(txt) {
  document.getElementById("loaderText").textContent = txt;
}

function showModal(id) {
  document.getElementById(id).classList.add("show");
}

function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove("show");
}

function showWarning(msg) {
  document.getElementById("warningMsg").textContent = msg;
  showModal("modalWarning");
}

// Close modal on backdrop click
document.querySelectorAll(".modal-backdrop").forEach(el => {
  el.addEventListener("click", e => {
    if (e.target === el) closeModal(el.id);
  });
});

// === TOAST ===
function showToast(icon, msg, type) {
  const container = document.getElementById("toastContainer");
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerHTML = `<span class="toast-icon">${icon}</span><span class="toast-msg">${msg}</span>`;

  const colors = { success: "#10b981", error: "#ef4444", info: "#3b82f6" };
  toast.style.borderLeft = `3px solid ${colors[type] || colors.info}`;

  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.add("exit");
    setTimeout(() => toast.remove(), 350);
  }, 3000);
}

// === CONFETTI ===
function launchConfetti() {
  const wrap = document.getElementById("confettiWrap");
  const colors = ["#60a5fa","#a78bfa","#34d399","#fbbf24","#f87171","#e879f9"];
  const shapes = ["◆","★","●","■","▲"];

  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement("div");
      el.className = "confetti-piece";
      el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
      el.style.cssText = `
        left: ${Math.random() * 100}%;
        top: -20px;
        color: ${colors[Math.floor(Math.random() * colors.length)]};
        font-size: ${8 + Math.random() * 12}px;
        animation-duration: ${1.5 + Math.random() * 1.5}s;
        animation-delay: ${Math.random() * 0.5}s;
      `;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 30);
  }
}

// Close modals on ESC
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    document.querySelectorAll(".modal-backdrop.show").forEach(el => el.classList.remove("show"));
  }
});
</script>
